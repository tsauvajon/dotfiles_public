set-option -g default-terminal "tmux-256color"

set -g mouse on
set -g prefix2 IC

set -g set-clipboard on          # use system clipboard
set -g status-position top       # macOS / darwin style
set -g detach-on-destroy off     # don't exit from tmux when closing a session

bind r source-file ~/.tmux.conf
bind t new-window

bind ] split-window -h
bind '\' split-window -v

# Invert default split bindings: " for horizontal, % for vertical
unbind '"'
unbind %
bind '"' split-window -h
bind % split-window -v

# 'Sane' mouse scrolling
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'copy-mode -e; send-keys -M'"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
# tmux-cpu provides the cpu_percentage.sh script we shell out to in status-right.
# We don't use its #{cpu_percentage} substitution (which only works on
# status-right/-left directly, not on values stored in #{E:@catppuccin_*}
# references), so we just call its script directly.
set -g @plugin 'tmux-plugins/tmux-cpu'

# Persist tmux sessions and content
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-auto-restore 'on'

# Autosave/autoload by session name
set -g @continuum-restore 'on'

# Theme (must be set before catppuccin loads)
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "basic"
set -g @catppuccin_window_current_text " #{window_name}"
set -g @catppuccin_window_text " #{window_name}"
set -g @catppuccin_window_current_number_color "#{?window_zoomed_flag,#{@thm_yellow},#{@thm_mauve}}" # typos: ignore
set -g @catppuccin_window_number_color "#{?window_zoomed_flag,#{@thm_yellow},#{@thm_overlay_2}}" # typos: ignore

# Load plugins
run ~/.tmux/plugins/tpm/tpm
run ~/.tmux/plugins/tmux/catppuccin.tmux

# Status line — render catppuccin modules (must come after the plugin loads)
set -g status-interval 5
set -g status-left-length 100
set -g status-right-length 100
# All `set -ag` (NOT `-agF`) below. `-F` eagerly expands #{...} at set-time,
# which (a) bakes the current client's session/cwd into status-left/right for
# every client, and (b) destroys lazy #{l:#(...)} wrappers. With `-ag`, the
# raw template is stored and tmux expands it per-client at render time.
#
# Modules that reference `#{E:@catppuccin_status_*}` (application, session,
# directory) work fine — the chain only contains #{...} format vars (#S,
# #{pane_current_path}, etc.) which tmux resolves recursively per-client.
#
# Modules that depend on `#(...)` shell commands (gitmux, cpu, uptime) MUST be
# inlined directly in status-right/-left. tmux only shell-executes #(...) at
# the top level of status-right/-left — once it's buried inside #{E:@option},
# the chain returns the #(...) text but never runs it.
set -g status-left ""
set -ag status-left "#{E:@catppuccin_status_directory}"
# Inlined git-branch module (replaces catppuccin's gitmux wrapper).
# Single-quote outer string so the shell command's $vars and "..." stay clean.
set -ag status-left '#[fg=#{E:@thm_teal}]#[fg=#{E:@thm_crust},bg=#{E:@thm_teal}]󰊢 #[fg=#{E:@thm_fg},bg=#{E:@catppuccin_status_module_text_bg}] #(b=$(git -C "#{pane_current_path}" symbolic-ref --short HEAD 2>/dev/null); [ -z "$b" ] && exit; d=$(git -C "#{pane_current_path}" status --porcelain 2>/dev/null | head -c1); [ -n "$d" ] && echo "$b ●" || echo "$b")#[fg=#{E:@catppuccin_status_module_text_bg}] '

set -g status-right "#{E:@catppuccin_status_application}"
set -ag status-right "#{E:@catppuccin_status_session}"
# Inlined CPU% module ( = nerd-fonts microchip glyph U+F2DB).
set -ag status-right '#[fg=#{E:@thm_yellow}]#[fg=#{E:@thm_crust},bg=#{E:@thm_yellow}] #[fg=#{E:@thm_fg},bg=#{E:@catppuccin_status_module_text_bg}] #(~/.tmux/plugins/tmux-cpu/scripts/cpu_percentage.sh)#[fg=#{E:@catppuccin_status_module_text_bg}] '
# Inlined uptime module. sed -E avoids \{...\} brace literals.
set -ag status-right '#[fg=#{E:@thm_sapphire}]#[fg=#{E:@thm_crust},bg=#{E:@thm_sapphire}]󰔟 #[fg=#{E:@thm_fg},bg=#{E:@catppuccin_status_module_text_bg}] #(uptime | sed -E "s/^[^,]*up *//; s/, *[0-9]+ user.*//; s/ day.*, */d /; s/ hr.*/h/; s/ min.*/m/; s/ sec.*/s/; s/([0-9]+):([0-9]+)/\1h \2m/")#[fg=#{E:@catppuccin_status_module_text_bg}] '
