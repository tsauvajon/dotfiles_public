set-option -g default-terminal "tmux-256color"

set -g mouse on
set -g prefix2 IC

set -g set-clipboard on          # use system clipboard
set -g status-position top       # macOS / darwin style
set -g detach-on-destroy off     # don't exit from tmux when closing a session

bind r source-file ~/.tmux.conf
bind t new-window

bind ] split-window -h
bind '\' split-window -v

# Invert default split bindings: " for horizontal, % for vertical
unbind '"'
unbind %
bind '"' split-window -h
bind % split-window -v

# 'Sane' mouse scrolling
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'copy-mode -e; send-keys -M'"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
# tmux-cpu provides the cpu_percentage.sh script we shell out to in status-right.
# We don't use its #{cpu_percentage} substitution (which only works on
# status-right/-left directly, not on values stored in #{E:@catppuccin_*}
# references), so we just call its script directly.
set -g @plugin 'tmux-plugins/tmux-cpu'

# Persist tmux sessions and content
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-auto-restore 'on'

# Autosave/autoload by session name
set -g @continuum-restore 'on'

# Theme (must be set before catppuccin loads)
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "basic"
set -g @catppuccin_window_current_text " #{window_name}"
set -g @catppuccin_window_text " #{window_name}"
set -g @catppuccin_window_current_number_color "#{?window_zoomed_flag,#{@thm_yellow},#{@thm_mauve}}" # typos: ignore
set -g @catppuccin_window_number_color "#{?window_zoomed_flag,#{@thm_yellow},#{@thm_overlay_2}}" # typos: ignore

# Override uptime text — upstream uses bare #(...) which gets eagerly evaluated
# at substitution time and ends up empty. Wrap in #{l:...} to defer execution
# to status-bar render. uptime.conf uses `-ogq` so this pre-load override wins.
# Using sed -E (extended regex) to avoid \{...\} which collide with #{l:...}'s
# closing-brace matcher.
set -g @catppuccin_uptime_text "#{l: #(uptime | sed -E 's/^[^,]*up *//; s/, *[0-9]+ user.*//; s/ day.*, */d /; s/ hr.*/h/; s/ min.*/m/; s/ sec.*/s/; s/([0-9]+):([0-9]+)/\\1h \\2m/')}"

# Load plugins
run ~/.tmux/plugins/tpm/tpm
run ~/.tmux/plugins/tmux/catppuccin.tmux

# Override the gitmux module to use a lightweight git status (no gitmux binary
# required). Must run AFTER catppuccin loads because gitmux.conf is the one
# catppuccin module that uses `set -gq` (forced overwrite) instead of `-ogq`,
# so a pre-load override gets clobbered.
#
# `#{l:...}` (literal) wrapping defers the `#(...)` shell-out to status-bar
# render time — without it, tmux evaluates the command eagerly when the option
# is set and caches the (often empty) initial result.
#
# @catppuccin_status_gitmux references @catppuccin_gitmux_text via #{E:...}
# at render time, so updating the text after the wrapper is built still works.
set -g "@catppuccin_gitmux_text" \
  '#{l: #(b=$(git -C "#{pane_current_path}" symbolic-ref --short HEAD 2>/dev/null); [ -z "$b" ] && exit; d=$(git -C "#{pane_current_path}" status --porcelain 2>/dev/null | head -c1); [ -n "$d" ] && echo "$b ●" || echo "$b")}'

# Status line — render catppuccin modules (must come after the plugin loads)
set -g status-interval 5
set -g status-left-length 100
set -g status-right-length 100
# Use `-ag` (NOT `-agF`) below: `-F` eagerly expands the #{E:...} chain at
# set-time, baking the current client's session name and pane cwd into the
# value for every client. With `-ag`, the literal #{E:@catppuccin_status_*}
# reference is stored and tmux expands it per-client at render time, so each
# session shows its own #S, #{pane_current_path}, etc.
set -g status-left ""
set -ag status-left "#{E:@catppuccin_status_directory}"
set -ag status-left "#{E:@catppuccin_status_gitmux}"
set -g status-right "#{E:@catppuccin_status_application}"
set -ag status-right "#{E:@catppuccin_status_session}"
# Custom CPU% module — inlined as a styled pill (yellow icon, surface_0 text bg).
# Catppuccin's cpu wrapper relies on tmux-cpu's #{cpu_percentage} string
# substitution, which only operates on status-right/-left directly; with `-ag`
# those values are #{E:...} references, not placeholders, so the substitution
# misses. Calling the script directly via `#{l:#(...)}` keeps it deferred to
# render time without depending on the plugin's substitution pass.
set -agF status-right "#[fg=#{E:@thm_yellow}]#[fg=#{E:@thm_crust},bg=#{E:@thm_yellow}] #[fg=#{E:@thm_fg},bg=#{E:@catppuccin_status_module_text_bg}]#{l: #(~/.tmux/plugins/tmux-cpu/scripts/cpu_percentage.sh)}#[fg=#{E:@catppuccin_status_module_text_bg}] "
set -ag status-right "#{E:@catppuccin_status_uptime}"
