# Needed for Nvidia GPUs
# https://wiki.hyprland.org/0.41.2/Nvidia
env = LIBVA_DRIVER_NAME, nvidia
env = XDG_SESSION_TYPE, wayland
env = GBM_BACKEND, nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME, nvidia
env = EGL_PLATFORM, wayland
env = WLR_NO_HARDWARE_CURSORS, 1

# Mouse cursor themes through hyprcursor
env = HYPRCURSOR_THEME,Bibata-Modern-Classic
env = HYPRCURSOR_SIZE,42
env = XCURSOR_THEME,Bibata-Modern-Classic
env = XCURSOR_SIZE,42


# Nvidia VA-API (?) hardware video acceleration
env = NVD_BACKEND, direct

# Force Mozilla to use Wayland
env = MOZ_ENABLE_WAYLAND, 1

# QT
env = QT_QPA_PLATFORMTHEME, qt6ct
env = QT_STYLE_OVERRIDE, kvantum
env = QT_WAYLAND_DISABLE_WINDOWDECORATION, 1
env = QT_AUTO_SCREEN_SCALE_FACTOR, 1

# Fixes Electron/CEF flickering
env = ELECTRON_OZONE_PLATFORM_HINT, auto

# Steam scaling
# env = STEAM_FORCE_DESKTOPUI_SCALING, 1.75

# GTK
# env = GDK_SCALE, 2
# env = GDK_DPI_SCALE, 1
# env = GSDK_RENDERER, ngl
# env = GDK_DISABLE, vulkan
