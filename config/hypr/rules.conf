# Docs: https://wiki.hypr.land/Configuring/Window-Rules/

windowrule = float on, match:title ^(Save File)$
windowrule = float on, match:title ^(Open File)$
windowrule = float on, match:title ^(Select Folder)$
windowrule = float on, match:title ^(Sign In - Google Accounts)$
windowrule = float on, match:class ^()$, match:title ^(Save File)$
windowrule = float on, match:class ^()$, match:title ^(Open File)$
windowrule = float on, match:class ^()$, match:title ^(Select Folder)$
windowrule = float on, match:class ^(CachyOSHello)$

windowrule = float on, match:class ^(qalculate-gtk)$
windowrule = float on, match:class ^(waypaper)$
windowrule = float on, match:class ^(nm-connection-editor)$
windowrule = float on, match:class ^(blueman-manager)$
windowrule = float on, match:class ^(org.pulseaudio.pavucontrol)$
windowrule = float on, match:class ^(jamesdsp)$
windowrule = float on, match:class ^(org.kde.polkit-kde-authentication-agent-1)$
windowrule = float on, match:class ^(.*desktop-portal-gtk.*)$
windowrule = float on, match:class ^(xdg-desktop-portal-kde)$
windowrule = float on, match:class ^(xdg-desktop-portal-hyprland)$
windowrule = float on, match:class ^(com.github.Aylur.ags)$

# File Manager.
windowrule = float on, match:class ^(pcmanfm)$
windowrule = size 450 172, match:class ^(pcmanfm)$, match:initial_title ^(Creating.*)$
windowrule = size 450 172, match:class ^(pcmanfm)$, match:initial_title ^(Rename File)$
windowrule = size 600 112, match:class ^(pcmanfm)$, match:initial_title ^(Execute File)$
windowrule = size 600 242, match:class ^(pcmanfm)$, match:initial_title ^(Moving files)$
windowrule = size 750 500, match:class ^(pcmanfm)$

# Feh Image Viewer
windowrule = float on, match:class ^(feh)$

# GTK and QT Settings.
windowrule = float on, match:class ^(nwg-look)$
windowrule = float on, match:class ^(dconf-editor)$
windowrule = float on, match:class ^(qt5ct)$
windowrule = float on, match:class ^(qt6ct)$
windowrule = float on, match:class ^(kvantummanager)$
windowrule = size 500 700, match:class ^(dconf-editor)$
windowrule = size 633 600, match:class ^(qt5ct)$
windowrule = size 658 763, match:class ^(qt6ct)$
windowrule = size 753 730, match:class ^(kvantummanager)$

# Picture in Picture.
windowrule = float on, match:title ^(Picture in picture)$
windowrule = float on, match:title ^(Picture-in-Picture)$
windowrule = size 854 480, match:title ^(Picture in picture)$
windowrule = size 854 480, match:title ^(Picture-in-Picture)$

# ROG control center.
windowrule = float on, match:title (ROG Control)
windowrule = size 900 650, match:title (ROG Control)
windowrule = center on, match:title (ROG Control)

# SSH key prompt.
windowrule = float on, match:class ^(ssh-add)$
windowrule = size 500 200, match:class ^(ssh-add)$
windowrule = center on, match:class ^(ssh-add)$

# Kitty terminal.
# windowrule = float on, match:class ^(kitty)$
windowrule = size 8200 540, match:class ^(kitty)$
windowrule = min_size 800 500, match:class ^(kitty)$

# JetBrains IDEs.
# windowrule = float on, match:class ^(jetbrains-idea-ce)$, match:title ^(Welcome to IntelliJ IDEA)$
# windowrule = float on, match:class ^(jetbrains-pycharm-ce)$, match:title ^(Welcome to PyCharm)$
# windowrule = float on, match:class ^(jetbrains-rider)$, match:title ^(Welcome to JetBrains Rider)$
# windowrule = float on, match:class ^(jetbrains-webstorm)$, match:title ^(Welcome to WebStorm)$
windowrule = center on, match:class ^(jetbrains-idea-ce)$, match:title ^(Remove Recent Project)$
windowrule = center on, match:class ^(jetbrains-pycharm-ce)$, match:title ^(Remove Recent Project)$
windowrule = center on, match:class ^(jetbrains-rider)$, match:title ^(Remove Recent Project)$
windowrule = center on, match:class ^(jetbrains-webstorm)$, match:title ^(Remove Recent Project)$

# Browsers.
windowrule = opaque on, match:class ^(zen-alpha)$
windowrule = opaque on, match:class ^(firefox)$
windowrule = opaque on, match:class ^(chromium)$
windowrule = border_size 0, match:class ^(chromium)$, match:fullscreen ^(1)$
windowrule = rounding 0, match:class ^(chromium)$, match:fullscreen ^(1)$

# Xtreme Download Manager.
windowrule = float on, match:class ^(xdm-app)$, match:initial_title ^(New Download)$
windowrule = float on, match:class ^(xdm-app)$, match:initial_title ^(Download Complete)$
windowrule = float on, match:class ^(xdm-app)$, match:initial_title ^(0% .*)$
windowrule = size 600 230, match:class ^(xdm-app)$, match:initial_title ^(New Download)$
windowrule = size 450 160, match:class ^(xdm-app)$, match:initial_title ^(Download Complete)$
windowrule = size 500 200, match:class ^(xdm-app)$, match:initial_title ^(0% .*)$

# Spotify.
windowrule = monitor eDP-2, match:class ^(Spotify)$

# MPV media player.
windowrule = float on, match:class ^(mpv)$
windowrule = size 70% 70%, match:class ^(mpv)$

# Steam.
windowrule = float on, match:class (steam)
windowrule = float on, match:class ^()$, match:title ^(Steam - Self Updater)$
windowrule = size 400 600, match:class ^(steam)$, match:title ^(Friends List)$
windowrule = move 100%-w-30 100%-w-75, match:class ^(steam)$, match:title ^(Friends List)$
windowrule = tile on, match:class (steam), match:title ^(.*Steam.*)$
windowrule = size 80% 80%, match:class ^(.*steam_app.*)$
windowrule = fullscreen on, match:class ^(.*steam_app.*)$
windowrule = min_size 1 1, match:title ^()$, match:class ^(steam)$

# Ryujinx.
windowrule = fullscreen on, match:class ^(Ryujinx)$, match:title ^(ContentDialogOverlayWindow)$
windowrule = stay_focused on, match:class ^(Ryujinx)$, match:title ^(ContentDialogOverlayWindow)$
windowrule = opaque on, match:class ^(Ryujinx)$, match:title ^(ContentDialogOverlayWindow)$
windowrule = border_size 0, match:class ^(Ryujinx)$, match:title ^(ContentDialogOverlayWindow)$
windowrule = no_shadow on, match:class ^(Ryujinx)$, match:title ^(ContentDialogOverlayWindow)$
windowrule = no_anim on, match:class ^(Ryujinx)$, match:title ^(ContentDialogOverlayWindow)$

# Davinci Resolve.
windowrule = center on, match:class ^(resolve)$, match:title ^(Project Manager)$
windowrule = center on, match:class ^(resolve)$, match:title ^(Preferences)$

# Photoshop.
windowrule = monitor HDMI-A-1, match:class ^(photoshop.exe)$
windowrule = tile on, match:class ^(photoshop.exe)$

# Affinity Photo.
windowrule = monitor HDMI-A-1, match:class ^(photo.exe)$
windowrule = tile on, match:initial_title ^(Affinity Photo 2)$, match:class ^(photo.exe)$

# Affinity Designer.
windowrule = monitor HDMI-A-1, match:class ^(designer.exe)$
windowrule = tile on, match:initial_title ^(Affinity Designer 2)$, match:class ^(designer.exe)$

# Affinity Publisher.
windowrule = monitor HDMI-A-1, match:class ^(publisher.exe)$
windowrule = tile on, match:initial_title ^(Affinity Publisher 2)$, match:class ^(publisher.exe)$

# Shotcut.
windowrule = float on, match:initial_title ^(Shotcut)$, match:class ^(org.shotcut.Shotcut)$
windowrule = size 320 320, match:initial_title ^(Shotcut)$, match:class ^(org.shotcut.Shotcut)$
windowrule = center on, match:initial_title ^(Shotcut)$, match:class ^(org.shotcut.Shotcut)$

# Telegram.
windowrule = size 70% 60%, match:title ^(Media viewer)$, match:class ^(org.telegram.desktop)$
windowrule = float on, match:title ^(Media viewer)$, match:class ^(org.telegram.desktop)$

# WoW
# windowrule = stay_focused on, match:class ^(wow.exe)$
# windowrule = no_blur on, match:class ^(wow.exe)$
# windowrule = no_initial_focus on, match:class ^(wow.exe)$
# windowrule = no_anim on, match:class ^(wow.exe)$
windowrule = tag +unfocused, match:class ^(wow.exe)$
windowrule = render_unfocused on, match:tag unfocused

# Ignore XWayland Video Bridge.
windowrule = opacity 0.0 override 0.0 override, match:class ^(xwaylandvideobridge)$
windowrule = no_anim on, match:class ^(xwaylandvideobridge)$
windowrule = no_focus on, match:class ^(xwaylandvideobridge)$
windowrule = no_initial_focus on, match:class ^(xwaylandvideobridge)$

# Forbid apps from maximizing or fullscreening themselves.
windowrule = suppress_event maximize, match:class .*
windowrule = suppress_event fullscreen, match:class .*

# Idle Inhibit.
windowrule = idle_inhibit focus, match:title .*(yuzu).*        # TODO: Add entries for other emulators.
windowrule = idle_inhibit focus, match:class .*(steam_app).*
windowrule = idle_inhibit always, match:class ^(zen-alpha)$, match:title ^(.*YouTube.*)$
windowrule = idle_inhibit always, match:class ^(zen-alpha)$, match:title ^(.*S[0-9].*E[0-9].*)$

