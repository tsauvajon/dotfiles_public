# Copy to ~/.config/dotfiles/config.toml and fill in real values.
#
# The private flake at ~/.config/dotfiles/flake.nix reads this file
# (via `builtins.fromTOML`) and exposes the values to the dotfiles
# Home Manager modules. Edit this file to change identity, then
# refresh the lock and re-activate:
#
#   nix --extra-experimental-features 'nix-command flakes' \
#     flake update private --flake /Users/<you>/dev/dotfiles
#   bash setup.sh

[git]
name = "Your Full Name"
email = "you@example.com"
signing_key = "0000000000000000"  # 16-char hex key ID — run: gpg --list-secret-keys --keyid-format long

[goto]
# See: https://github.com/tsauvajon/goto
api_url = "http://your-host:50002"

# task config uses the overlay-append pattern — no task entries belong here.
# Place private overlays at ~/.config/dotfiles/task.<name>.toml; the dotfiles
# Home Manager module reads them and merges with the base config. For example:
#
#   ~/.config/dotfiles/task.install.toml
#     [[install]]
#     repo = "gitlab.example.com/org/tool"
#
#   ~/.config/dotfiles/task.vscodium.toml
#     [vscodium]
#     trusted_roots = [
#         "/home/youruser/dev/wt/github.com/youruser",
#         "/home/youruser/dev/repos/github.com/youruser",
#     ]

# Private OpenCode skills live at ~/.config/dotfiles/opencode/skills/<skill-name>/SKILL.md
# Private OpenCode agents live at ~/.config/dotfiles/opencode/agents/<name>.md
# Private OpenCode rules overlays live at ~/.config/dotfiles/opencode/rules/
# Private OpenCode JSON overlays live at ~/.config/dotfiles/opencode/opencode.*.json
# Private SSH host config lives at ~/.config/dotfiles/ssh/config (included from ~/.ssh/config).
# Optional extra gitconfig can live at ~/.config/dotfiles/extra.gitconfig.
#
# After changing anything under ~/.config/dotfiles/, refresh the private
# flake input so Home Manager picks up the change:
#
#   nix --extra-experimental-features 'nix-command flakes' flake update private \
#     --flake /Users/<you>/dev/dotfiles
#   bash setup.sh
#
# rules_mode (merged | private_only | disabled) is now a Home Manager
# option — set `programs.opencode.rulesMode` in `home/hosts/<host>.nix`
# rather than here.
