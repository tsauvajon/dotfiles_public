# Copy to ~/.config/dotfiles/config.toml and fill in real values.
#
# The private flake at ~/.config/dotfiles/flake.nix reads this file
# (via `builtins.fromTOML`) and exposes the values to the dotfiles
# Home Manager modules. Edit this file to change identity, then
# re-activate (no lock update needed — setup.sh uses `path:` to
# read the private overlay's working tree directly):
#
#   bash setup.sh

[git]
name = "Your Full Name"
email = "you@example.com"
signing_key = "0000000000000000"  # 16-char hex key ID — run: gpg --list-secret-keys --keyid-format long

[goto]
# See: https://github.com/tsauvajon/goto
api_url = "http://your-host:50002"

# task config uses the overlay-append pattern. No task entries belong here;
# place private overlays at ~/.config/dotfiles/task.<name>.toml. The
# home/programs/task.nix module reads them and merges with the base config
# from config/task/config.toml. Examples:
#
#   ~/.config/dotfiles/task.install.toml
#     [[install]]
#     repo = "gitlab.example.com/org/tool"
#
#   ~/.config/dotfiles/task.vscodium.toml
#     [vscodium]
#     trusted_roots = [
#         "/home/youruser/dev/wt/github.com/youruser",
#         "/home/youruser/dev/repos/github.com/youruser",
#     ]

# Other private files this dotfiles tree understands:
#
#   ~/.config/dotfiles/extra.gitconfig
#     Included from ~/.config/git/config; useful for per-machine git tweaks.
#
#   ~/.config/dotfiles/ssh/config
#     Private SSH hosts; included from ~/.ssh/config.
#
#   ~/.config/dotfiles/goto/database.yml
#     Private goto bookmarks; symlinked into ~/.config/goto/database.yml.
#
#   ~/.config/dotfiles/cargo.<name>.toml
#     Cargo overlays, appended onto config/cargo/cargo-config.toml.
#
#   ~/.config/dotfiles/aerospace.<name>.toml
#     AeroSpace rules, appended onto config/aerospace/aerospace.toml.
#
#   ~/.config/dotfiles/alacritty.<name>.toml
#     Alacritty overlays, appended onto config/alacritty/alacritty.toml.
#
#   ~/.config/dotfiles/plist/<name>.plist
#     Extra macOS LaunchAgents; symlinked into ~/Library/LaunchAgents/.
#
#   ~/.config/dotfiles/opencode/opencode.json
#     Main private OpenCode override (deep-merged over the public base).
#
#   ~/.config/dotfiles/opencode/opencode.*.json
#     Additional JSON fragments (deep-merged in filename order).
#
#   ~/.config/dotfiles/opencode/{commands,skills,agents,plugins}/
#     Private OpenCode commands / skills / agents / plugins. Filename
#     collisions with the public set: private wins.
#
#   ~/.config/dotfiles/opencode/rules/
#     AGENTS.md overlays, appended in filename order (LC_ALL=C). Numeric
#     prefixes (10-, 20-, ...) work well for ordering.
#
#   ~/.config/dotfiles/opencode/package.json
#     Private plugin dependency overlay (deep-merged with the public one).
#
# After editing anything under ~/.config/dotfiles/, just rerun setup.sh.
# The build uses `--override-input private "path:$HOME/.config/dotfiles"`
# so Home Manager reads the working tree directly with no flake.lock churn:
#
#   bash setup.sh
#
# Note: rules_mode (merged | private_only | disabled) is now a Home Manager
# option — set `programs.opencode.rulesMode` in `home/hosts/<host>.nix`
# rather than here.
#
# External OpenCode imports — see the dotfiles AGENTS.md "External imports"
# section. Declare entries in `~/.config/dotfiles/flake.nix` under
# `opencode.imports` to pull skills/commands/plugins/JSON fragments from
# repos that don't expose Nix flakes. setup.sh syncs them into
# `~/.config/dotfiles/opencode-imports/<name>/` (gitignored) before build.
